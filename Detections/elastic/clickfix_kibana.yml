rule_id: elastic_mimicrat_clickfix_powershell_amsi_etw_zbuild
name: MIMICRAT ClickFix PowerShell AMSI ETW Bypass and zbuild Execution
description: Detects a focused MIMICRAT ClickFix execution pattern on Windows where PowerShell script activity indicates AMSI or ETW bypass behavior together with ProgramData staging or zbuild.exe execution associated with the reported campaign.
type: query
language: kuery
query: "(process.args: \"powershell.exe\" or process.args: \"pwsh.exe\" or message: \"powershell.exe\") and\n(\n  (\n    event.code: \"4104\" and\n    (\n      message: \"AmsiUtils\" or\n      message: \"amsiInitFailed\" or\n      message: \"System.Diagnostics.Eventing.EventProvider\" or\n      message: \"Marshal.Copy\"\n    ) and\n    (\n      message: \"ProgramData\" or\n      message: \"knz_\" or\n      message: \"zbuild.exe\"\n    )\n  ) or\n  (\n    event.category: \"process\" and\n    message: \"zbuild.exe\" and\n    (\n      message: \"ProgramData\" or\n      message: \"knz_\"\n    ) and\n    (\n      process.args: \"powershell.exe\" or\n      process.args: \"pwsh.exe\"\n    )\n  )\n)\n"
index:
  - .ds-logs-endpoint.events.process-*
  - .ds-logs-windows.sysmon-*
  - .ds-logs-system.security-*
  - .ds-logs-windows.powershell-*
  - logs-*
  - .ds-logs*
severity: high
risk_score: 78
enabled: true
tags:
  - attack.defense_evasion
  - attack.execution
  - attack.t1059.001
  - attack.t1562.001
  - attack.t1027
  - elastic
  - windows
  - clickfix
  - mimicrat
references:
  - https://www.elastic.co/security-labs/mimicrat-custom-rat-mimics-c2-frameworks
author: Gabriel Binion
version: 1.0
interval: 5m
from: now-30m
